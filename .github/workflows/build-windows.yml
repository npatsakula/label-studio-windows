name: Build Windows Executable

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller
          python -m pip install label-studio

      - name: List installed packages
        run: python -m pip list

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --console --name label-studio `
            --hidden-import=label_studio `
            --hidden-import=label_studio.server `
            --hidden-import=label_studio_sdk `
            --hidden-import=django `
            --hidden-import=django.contrib.admin `
            --hidden-import=django.contrib.auth `
            --hidden-import=django.contrib.contenttypes `
            --hidden-import=django.contrib.sessions `
            --hidden-import=django.contrib.messages `
            --hidden-import=django.contrib.staticfiles `
            --hidden-import=django.contrib.humanize `
            --hidden-import=django.core `
            --hidden-import=django.core.wsgi `
            --hidden-import=rest_framework `
            --hidden-import=rest_framework.views `
            --hidden-import=rest_framework.viewsets `
            --hidden-import=rest_framework.routers `
            --hidden-import=rest_framework.serializers `
            --hidden-import=rest_framework.authentication `
            --hidden-import=rest_framework.permissions `
            --hidden-import=rest_framework.parsers `
            --hidden-import=rest_framework.renderers `
            --hidden-import=rest_framework.response `
            --hidden-import=rest_framework.settings `
            --hidden-import=rest_framework.filters `
            --hidden-import=rest_framework.pagination `
            --hidden-import=rest_framework.generics `
            --hidden-import=rest_framework.mixins `
            --hidden-import=rest_framework.status `
            --hidden-import=rest_framework.exceptions `
            --hidden-import=rest_framework.fields `
            --hidden-import=rest_framework.schemas `
            --hidden-import=rest_framework.utils `
            --hidden-import=rest_framework.decorators `
            --hidden-import=rest_framework.throttling `
            --hidden-import=rest_framework.negotiation `
            --hidden-import=rest_framework.metadata `
            --hidden-import=rest_framework.validators `
            --hidden-import=rest_framework.relations `
            --hidden-import=rest_framework.request `
            --hidden-import=rest_framework.reverse `
            --hidden-import=rest_framework.test `
            --hidden-import=rest_framework.authtoken `
            --hidden-import=rest_framework.authtoken.models `
            --hidden-import=rest_framework.authtoken.views `
            --hidden-import=rest_framework_simplejwt `
            --hidden-import=rest_framework_simplejwt.authentication `
            --hidden-import=rest_framework_simplejwt.views `
            --hidden-import=rest_framework_simplejwt.tokens `
            --hidden-import=rest_framework_simplejwt.serializers `
            --hidden-import=rest_framework_simplejwt.token_blacklist `
            --hidden-import=drf_spectacular `
            --hidden-import=drf_spectacular.views `
            --hidden-import=drf_spectacular.openapi `
            --hidden-import=drf_generators `
            --hidden-import=drf_yasg `
            --hidden-import=drf_yasg.views `
            --hidden-import=drf_yasg.generators `
            --hidden-import=drf_yasg.inspectors `
            --hidden-import=drf_yasg.app_settings `
            --hidden-import=drf_yasg.openapi `
            --hidden-import=django_filters `
            --hidden-import=django_filters.rest_framework `
            --hidden-import=corsheaders `
            --hidden-import=corsheaders.middleware `
            --hidden-import=django_extensions `
            --hidden-import=django_extensions.apps `
            --hidden-import=django_rq `
            --hidden-import=django_user_agents `
            --hidden-import=django_user_agents.middleware `
            --hidden-import=rules `
            --hidden-import=annoying `
            --hidden-import=coreapi `
            --hidden-import=coreschema `
            --hidden-import=openapi_codec `
            --hidden-import=simplejson `
            --collect-all label_studio `
            --collect-all label_studio_sdk `
            --collect-all rest_framework `
            --collect-all drf_yasg `
            --collect-all drf_spectacular `
            --collect-all corsheaders `
            --collect-all django_extensions `
            --collect-all django_filters `
            main.py

      - name: Test executable
        run: |
          dist\label-studio.exe --help
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: label-studio-windows
          path: dist/label-studio.exe
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: label-studio-windows
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/label-studio.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
