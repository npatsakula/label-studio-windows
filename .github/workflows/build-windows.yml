name: Build Windows Executable

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller
          python -m pip install label-studio

      - name: List installed packages
        run: python -m pip list

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --console --name label-studio `
            --runtime-hook=hook-run-django_admin.py `
            --collect-submodules label_studio `
            --collect-submodules label_studio_sdk `
            --collect-submodules rest_framework `
            --collect-submodules rest_framework_simplejwt `
            --collect-submodules drf_yasg `
            --collect-submodules drf_spectacular `
            --collect-submodules django_filters `
            --collect-submodules corsheaders `
            --collect-submodules django_extensions `
            --collect-submodules django_rq `
            --collect-submodules django_user_agents `
            --collect-submodules rules `
            --collect-submodules drf_generators `
            --collect-submodules drf_dynamic_fields `
            --collect-submodules rest_flex_fields `
            --collect-submodules ldclient `
            --collect-submodules launchdarkly_server_sdk `
            --collect-submodules storages `
            --collect-submodules django_csp `
            --collect-submodules django_environ `
            --collect-submodules csp `
            --collect-submodules google.auth `
            --collect-submodules google.oauth2 `
            --collect-submodules google.cloud `
            --collect-submodules azure.core `
            --collect-submodules azure.storage `
            --collect-submodules botocore `
            --collect-submodules boto3 `
            --collect-submodules rq `
            --collect-submodules sentry_sdk `
            --collect-submodules pydantic `
            --collect-submodules jsonschema `
            --collect-submodules referencing `
            --collect-submodules jsonschema_specifications `
            --collect-data label_studio `
            --collect-data label_studio_sdk `
            --collect-data rest_framework `
            --collect-data rest_framework_simplejwt `
            --collect-data drf_yasg `
            --collect-data drf_spectacular `
            --collect-data django_filters `
            --collect-data django_extensions `
            --collect-data django_rq `
            --collect-data rules `
            --collect-data storages `
            --collect-data corsheaders `
            --collect-data sentry_sdk `
            --collect-data jsonschema `
            --collect-data pydantic `
            --collect-data drf_dynamic_fields `
            --collect-data rest_flex_fields `
            --copy-metadata label-studio `
            --copy-metadata label-studio-sdk `
            --copy-metadata django `
            --copy-metadata djangorestframework `
            --copy-metadata drf-spectacular `
            --copy-metadata drf-yasg `
            --copy-metadata django-cors-headers `
            --copy-metadata django-filter `
            --copy-metadata django-extensions `
            --copy-metadata django-rq `
            --copy-metadata rules `
            --copy-metadata pydantic `
            --copy-metadata sentry-sdk `
            --copy-metadata jsonschema `
            main.py

      - name: Test executable
        run: |
          dist\label-studio.exe --help
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: label-studio-windows
          path: dist/label-studio.exe
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: label-studio-windows
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/label-studio.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
