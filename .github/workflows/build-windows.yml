name: Build Windows Executable

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller
          python -m pip install label-studio

      - name: List installed packages
        run: python -m pip list

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --console --name label-studio --hidden-import=label_studio --hidden-import=label_studio.server --hidden-import=label_studio_sdk --hidden-import=django --hidden-import=django.contrib --hidden-import=django.contrib.admin --hidden-import=django.contrib.auth --hidden-import=django.contrib.contenttypes --hidden-import=django.contrib.sessions --hidden-import=django.contrib.staticfiles --hidden-import=rest_framework --collect-all label_studio --collect-all label_studio_sdk main.py

      - name: Test executable
        run: |
          dist\label-studio.exe --help
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: label-studio-windows
          path: dist/label-studio.exe
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: label-studio-windows
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/label-studio.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
